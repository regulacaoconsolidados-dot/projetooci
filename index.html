<!DOCTYPE html>
<html>
<head>
    <title>PAINEL OCI - MONITORAMENTO</title>
    <style>
        .progress-cell {
            width: 150px;
            height: 30px;
            background: #f0f0f0;
            border-radius: 15px;
            position: relative;
            text-align: center;
            line-height: 30px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            border-radius: 15px;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .progress-text {
            position: relative;
            z-index: 2;
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
        }
        .status-verde { background-color: #4CAF50; color: white; }
        .status-amarelo { background-color: #FFC107; color: black; }
        .status-vermelho { background-color: #F44336; color: white; }
    </style>
</head>
<body>
    <div id="app">
        <h1>🏥 PAINEL DE MONITORAMENTO OCI</h1>
        <div id="filtros">
            <select id="filtroEspecialidade">
                <option value="">Todas Especialidades</option>
            </select>
            <select id="filtroStatus">
                <option value="">Todos Status</option>
                <option value="✅">Concluído</option>
                <option value="⏳">Em Andamento</option>
                <option value="❌">Falta</option>
            </select>
            <input type="text" id="busca" placeholder="🔍 Nº Solicitação ou Paciente">
        </div>
        <table id="tabelaOCI">
            <thead>
                <tr>
                    <th>Nº Solicitação</th>
                    <th>Prontuário</th>
                    <th>Paciente</th>
                    <th>Especialidade</th>
                    <th>Início</th>
                    <th>Progresso</th>
                    <th>Status Exames</th>
                    <th>Previsão</th>
                </tr>
            </thead>
            <tbody id="corpoTabela">
            </tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
